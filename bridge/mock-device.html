<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Claude Deck — mock device</title>
<style>
  :root{ --bg:#0a0b0f; --panel:#12141c; --ink:#e9edf5; --dim:#8a93a6; --line:#222633;
         --accent:#d6743a; --accent2:#7aa2ff; --ok:#46c46a; --warn:#e8b84b; --err:#ef5a5a; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#05060a; color:var(--ink); font:14px/1.4 -apple-system,Segoe UI,Roboto,sans-serif;
        display:flex; gap:24px; align-items:flex-start; padding:24px; }
  /* device = native 172x640 portrait, scaled up x1.5 for viewing */
  .device{ width:172px; height:640px; transform:scale(1.5); transform-origin:top left;
           margin-right:120px; background:var(--bg); border-radius:18px; border:2px solid #1b1f2b;
           box-shadow:0 0 0 6px #0c0e15, 0 18px 50px rgba(0,0,0,.6); overflow:hidden;
           display:flex; flex-direction:column; position:relative; }
  .statusbar{ height:34px; flex:0 0 auto; display:flex; align-items:center; gap:6px; padding:0 8px;
              border-bottom:1px solid var(--line); font-size:11px; color:var(--dim); }
  .dot{ width:9px; height:9px; border-radius:50%; background:var(--dim); flex:0 0 auto; }
  .dot.idle{background:#4a5163} .dot.thinking{background:var(--accent2); animation:pulse 1s infinite}
  .dot.working{background:var(--accent2)} .dot.waiting{background:var(--warn); animation:pulse .8s infinite}
  .dot.done{background:var(--ok)} .dot.error{background:var(--err)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .title{ font-weight:600; color:var(--ink); font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:80px; }
  .state{ color:var(--dim); font-size:10px; margin-left:auto; white-space:nowrap; }
  /* session selector: one bar showing the focused session; tap -> dropdown picker (mirrors the firmware) */
  .sessbar{ flex:0 0 auto; padding:5px 6px; border-bottom:1px solid var(--line); position:relative; }
  .sessbar:empty{ display:none; padding:0; border:0; }
  .sessbtn{ display:flex; align-items:center; gap:6px; font-size:13px; padding:6px 12px; border-radius:16px;
            border:1px solid var(--line); background:var(--panel); color:var(--ink); cursor:pointer; }
  .sessbtn.focus{ border:2px solid var(--accent); padding:5px 11px; }
  .sessbtn.needs{ border:2px solid var(--warn); padding:5px 11px; }
  .sessbtn .t{ flex:1 1 auto; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sessbtn .t.dim{ color:var(--dim); }
  .sessbtn .badge{ flex:0 0 auto; color:var(--warn); font-size:11px; animation:pulse 1s infinite; }
  .sessbtn .n{ flex:0 0 auto; color:var(--dim); font-size:11px; }
  .sesspick{ position:absolute; left:6px; right:6px; top:calc(100% - 2px); z-index:20; background:var(--bg);
             border:1px solid var(--line); border-radius:10px; padding:6px; max-height:320px; overflow-y:auto;
             box-shadow:0 8px 24px rgba(0,0,0,.5); }
  .pickrow{ display:flex; align-items:center; gap:6px; padding:8px; border:1px solid var(--line); border-radius:9px;
            background:var(--panel); cursor:pointer; margin-bottom:6px; font-size:13px; color:var(--ink); }
  .pickrow:last-child{ margin-bottom:0; }
  .pickrow:hover{ border-color:var(--accent2); }
  .pickrow.focus{ border:2px solid var(--accent); background:rgba(214,116,58,.16); padding:7px; }
  .pickrow.needs{ border-color:var(--warn); }
  .pickrow.needs:not(.focus) .t{ color:var(--warn); }
  .pickrow .ic{ flex:0 0 16px; text-align:center; }
  .pickrow .t{ flex:1 1 auto; min-width:0; overflow-wrap:anywhere; }
  .pickrow .host{ font-size:10px; color:var(--dim); margin-left:5px; }
  .body{ flex:1 1 auto; overflow-y:auto; padding:8px; }
  .hdr{ font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--accent);
        background:rgba(214,116,58,.12); border:1px solid rgba(214,116,58,.3); border-radius:6px;
        padding:3px 6px; display:inline-block; margin-bottom:6px; }
  .q{ font-size:14px; font-weight:600; margin:2px 0 10px; }
  .opt{ display:block; width:100%; text-align:left; background:var(--panel); color:var(--ink);
        border:1px solid var(--line); border-radius:9px; padding:8px 9px; margin-bottom:7px; cursor:pointer; }
  .opt:hover{ border-color:var(--accent2); }
  .opt:active{ transform:scale(.98); }
  .opt .l{ font-weight:600; font-size:13px; }
  .opt .d{ font-size:10.5px; color:var(--dim); margin-top:2px; }
  .opt.sel{ border-color:var(--accent); background:rgba(214,116,58,.14); }
  .confirm{ width:100%; background:var(--accent); color:#1a1206; font-weight:700; border:0;
            border-radius:9px; padding:9px; margin-top:2px; cursor:pointer; }
  .placeholder{ color:var(--dim); text-align:center; margin-top:40px; font-size:12px; }
  /* live activity feed (Session screen when no question) */
  .feed{ display:flex; flex-direction:column; gap:1px; }
  .feedline{ display:flex; align-items:baseline; gap:6px; padding:3px 3px; border-bottom:1px solid rgba(34,38,51,.5);
             font:11.5px/1.4 ui-monospace,Menlo,monospace; }
  .feedline .fk{ flex:0 0 auto; width:15px; text-align:center; font-size:14px; color:var(--accent2); }  /* tool = blue, default */
  .feedline .fd{ flex:1 1 auto; min-width:0; color:var(--ink); white-space:normal; overflow-wrap:anywhere; }
  .feedline.k-prompt .fk{ color:var(--accent); }                              /* you = orange */
  .feedline.k-done .fk{ color:var(--ok); } .feedline.k-reply .fk{ color:var(--ok); }   /* done/reply = green */
  .feedline.k-notify .fk{ color:var(--warn); } .feedline.k-start .fk{ color:var(--dim); }
  .feedline.now{ background:rgba(122,162,255,.12); border-radius:4px; }
  .feedhint{ color:var(--dim); text-align:center; margin-top:30px; font-size:12px; }
  .macros{ display:flex; flex-direction:column; gap:7px; }
  .macro{ background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:13px 10px;
          text-align:center; cursor:pointer; }
  .macro:hover{ border-color:var(--accent2); }
  .macro .i{ font-size:18px; } .macro .t{ font-size:12px; margin-top:3px; color:var(--dim); }
  .voicebtn{ margin:60px auto 0; width:120px; height:120px; border-radius:50%; background:var(--panel);
             border:2px solid var(--accent); color:var(--accent); font-weight:700; display:flex;
             align-items:center; justify-content:center; cursor:pointer; user-select:none; }
  .voicebtn.rec{ background:rgba(239,90,90,.2); border-color:var(--err); color:var(--err); }
  .hud .row{ display:flex; justify-content:space-between; border-bottom:1px solid var(--line);
             padding:6px 2px; font-size:12px; }
  .hud .row .k{ color:var(--dim); } .hud .row .v{ font-weight:600; }
  /* compact telemetry strip at the bottom of the Session page */
  .hudstrip{ margin-top:10px; padding-top:6px; border-top:1px solid var(--line); color:var(--dim);
             font-size:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  /* Settings rows (device-local toggles; no bridge protocol) */
  .setrow{ display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--line);
           padding:12px 2px; font-size:14px; }
  .tabs{ flex:0 0 auto; display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:6px;
         border-top:1px solid var(--line); }
  .tab{ text-align:center; padding:8px 0; font-size:11px; color:var(--dim); cursor:pointer;
        background:var(--panel); border:1px solid var(--line); border-radius:10px; }
  .tab .ic{ font-size:18px; display:block; margin-bottom:2px; }
  .tab.active{ color:var(--accent); border-color:var(--accent); background:rgba(214,116,58,.12); }
  .flash{ position:absolute; inset:0; background:var(--warn); opacity:0; pointer-events:none; }
  .flash.on{ animation:fl .5s ease 3; }
  @keyframes fl{0%,100%{opacity:0}50%{opacity:.22}}
  /* side console */
  .console{ width:520px; }
  .console h2{ font-size:13px; color:var(--dim); font-weight:600; margin:0 0 8px; }
  .conn{ font-size:12px; margin-bottom:8px; }
  .conn b.up{color:var(--ok)} .conn b.down{color:var(--err)}
  .pairbox{ background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:10px; margin-bottom:10px; font-size:12px; }
  .pairbox .code{ font-size:22px; font-weight:700; letter-spacing:.08em; color:var(--accent); margin:6px 0; }
  .pairbox button{ background:var(--accent); color:#1a1206; font-weight:700; border:0; border-radius:6px; padding:6px 12px; margin:4px 6px 0 0; cursor:pointer; }
  .pairbox button.reject{ background:var(--err); color:#fff; }
  .trustrow{ display:flex; justify-content:space-between; align-items:center; font-size:11px; padding:4px 0; border-bottom:1px solid var(--line); }
  .trustrow button{ font-size:10px; padding:3px 7px; margin-left:4px; background:var(--bg); border:1px solid var(--line); color:var(--ink); border-radius:5px; cursor:pointer; }
  #log{ background:#0b0d13; border:1px solid var(--line); border-radius:8px; height:560px; overflow-y:auto;
        padding:8px; font:11px/1.5 ui-monospace,Menlo,monospace; color:#aeb6c6; white-space:pre-wrap; }
  .log-tx{ color:var(--accent2); } .log-rx{ color:var(--accent); } .log-sys{ color:var(--dim); }
</style>
</head>
<body>
  <div class="device">
    <div class="statusbar"><span class="dot idle" id="dot"></span><span id="titletxt" class="title">—</span><span id="statetxt" class="state">connecting…</span></div>
    <div class="sessbar" id="sessbar"></div>
    <div class="body" id="body"></div>
    <div class="tabs">
      <div class="tab active" data-m="decide"><span class="ic">✓</span>Session</div>
      <div class="tab" data-m="macros"><span class="ic">⌨</span>Macros</div>
      <div class="tab" data-m="voice"><span class="ic">🎙</span>Voice</div>
      <div class="tab" data-m="settings"><span class="ic">⚙</span>Settings</div>
    </div>
    <div class="flash" id="flash"></div>
  </div>

  <div class="console">
    <h2>mock console</h2>
    <div class="conn">WebSocket: <b id="connstate" class="down">disconnected</b> &nbsp;→ <code id="wsurl"></code></div>
    <div id="pairing-panel"></div>
    <div id="trust-panel"></div>
    <div id="log"></div>
  </div>

<script>
// The deck connects to every bridge it discovers via mDNS. The browser can't do mDNS, so list
// the bridge ports here: open with ?b=8787,8788 to mirror two machines. Default: 8787.
const HOST = (location.protocol==='file:'? 'localhost' : location.hostname);
const PORTS = (new URLSearchParams(location.search).get('b') || '8787').split(',').map(s=>s.trim()).filter(Boolean);
document.getElementById('wsurl').textContent = PORTS.map(p=>`ws://${HOST}:${p}`).join('  ,  ');
let mode='decide', ask=null, sel={}, hud={}, macros=[], state={state:'idle',text:'idle'};
let sessions=[], focus=null, qIdx=0, answersAcc={}, hosts={};   // focus = {sid, bridge} | null; hosts[bridge]=machine
let feed=[];                                                     // activity lines for the focused session
let voiceState='idle', voiceId=0, voiceText='';                  // mic action + on-device confirm (mirrors firmware)
let conns=[];   // per-bridge connection: {idx, ws, up, authenticated, sessionKeys, counters, pairing, authPending}
// dedup: a machine reachable via the LAN and the tailnet sends the same bridge_id from two connections.
// Keep both; only the "primary" (lowest connected index here; the firmware prefers the LAN path) shows.
let bidByBridge={}, lastListByBridge={}, primaryByBridge={};

function log(msg, cls='log-sys'){ const el=document.getElementById('log');
  const t=new Date().toLocaleTimeString();
  el.innerHTML += `<span class="${cls}">[${t}] ${msg}</span>\n`; el.scrollTop=el.scrollHeight; }

// ---------- pairing/auth crypto: WebCrypto SubtleCrypto (X25519 ECDH, HMAC-SHA256, AES-256-GCM) ----------
// Must derive byte-identical values to bridge/crypto.mjs (node:crypto) and the firmware's vendored
// x25519.c + mbedtls — three independent implementations of the same wire protocol (docs/PROTOCOL.md).
if (!window.isSecureContext || !window.crypto || !crypto.subtle) {
  log('WARNING: crypto.subtle unavailable — open this page via http://localhost:PORT/, not a bare LAN IP. Pairing/encryption will fail.');
}
async function genKeyPair(){
  try {
    const kp = await crypto.subtle.generateKey({ name:'X25519' }, true, ['deriveBits']);
    const rawPublic = new Uint8Array(await crypto.subtle.exportKey('raw', kp.publicKey));
    return { privateKey: kp.privateKey, rawPublic };
  } catch(e) { log('X25519 unsupported by this browser (need a recent Chrome): '+e.message); throw e; }
}
async function ecdh(privateKey, peerRawPub){
  const peerKey = await crypto.subtle.importKey('raw', peerRawPub, { name:'X25519' }, false, []);
  return new Uint8Array(await crypto.subtle.deriveBits({ name:'X25519', public: peerKey }, privateKey, 256));
}
function concatBytes(...arrs){ let len=0; arrs.forEach(a=>len+=a.length); const out=new Uint8Array(len); let o=0; arrs.forEach(a=>{ out.set(a,o); o+=a.length; }); return out; }
function cmpBytes(a,b){ const n=Math.min(a.length,b.length); for(let i=0;i<n;i++){ if(a[i]!==b[i]) return a[i]-b[i]; } return a.length-b.length; }
function sortPubs(a,b){ return cmpBytes(a,b)<=0 ? [a,b] : [b,a]; }   // byte-lexicographic — matches C memcmp / Buffer.compare
async function hmac(keyBytes, ...parts){
  const key = await crypto.subtle.importKey('raw', keyBytes, { name:'HMAC', hash:'SHA-256' }, false, ['sign']);
  return new Uint8Array(await crypto.subtle.sign('HMAC', key, concatBytes(...parts)));
}
const utf8 = (s)=> new TextEncoder().encode(s);
async function sas6(shared, pubA, pubB){
  const [x,y] = sortPubs(pubA,pubB);
  const mac = await hmac(shared, x, y);
  const n = ((mac[0]<<16) | (mac[1]<<8) | mac[2]) >>> 0;
  return String(n % 1000000).padStart(6,'0');
}
async function derivePsk(shared){ return hmac(shared, utf8('claudeq-psk-v1')); }
async function authTranscript(nonceDevice, nonceBridge, pubDeviceEph, pubBridgeEph){
  const [x,y] = sortPubs(pubDeviceEph, pubBridgeEph);
  return concatBytes(nonceDevice, nonceBridge, x, y);
}
async function deriveSessionKey(psk, ecdhShared, transcript){ return hmac(psk, ecdhShared, transcript, utf8('claudeq-session-v1')); }
async function directionalKeys(sessionKey){ return { d2b: await hmac(sessionKey, utf8('d2b')), b2d: await hmac(sessionKey, utf8('b2d')) }; }
async function authTag(sessionKey, role, transcript){ return hmac(sessionKey, utf8(role), transcript); }
function counterIv(counter){ const iv=new Uint8Array(12); new DataView(iv.buffer).setBigUint64(4, BigInt(counter)); return iv; }
async function gcmEncrypt(keyBytes, counter, ptBytes){
  const key = await crypto.subtle.importKey('raw', keyBytes, { name:'AES-GCM' }, false, ['encrypt']);
  return new Uint8Array(await crypto.subtle.encrypt({ name:'AES-GCM', iv: counterIv(counter), tagLength:128 }, key, ptBytes));   // ciphertext || tag
}
async function gcmDecrypt(keyBytes, counter, ctBytes){   // throws (rejects) on tag mismatch
  const key = await crypto.subtle.importKey('raw', keyBytes, { name:'AES-GCM' }, false, ['decrypt']);
  return new Uint8Array(await crypto.subtle.decrypt({ name:'AES-GCM', iv: counterIv(counter), tagLength:128 }, key, ctBytes));
}
function b64(bytes){ let s=''; bytes.forEach(b=>s+=String.fromCharCode(b)); return btoa(s); }
function unb64(str){ const bin=atob(str); const out=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) out[i]=bin.charCodeAt(i); return out; }
function randomBytes(n){ const b=new Uint8Array(n); crypto.getRandomValues(b); return b; }

// ---------- persistent device identity + paired-bridge trust store (localStorage stands in for NVS) ----------
function getDeviceId(){ let id=localStorage.getItem('claudeq_device_id'); if(!id){ id=crypto.randomUUID(); localStorage.setItem('claudeq_device_id', id); } return id; }
const DEVICE_ID = getDeviceId();
function loadTrust(){ try{ return JSON.parse(localStorage.getItem('claudeq_trust')||'{}'); } catch{ return {}; } }
function saveTrust(t){ localStorage.setItem('claudeq_trust', JSON.stringify(t)); }
let trustStore = loadTrust();   // { [bridge_id]: { psk: base64, label, pairedAt } }
let pairingUi = { bridge:null, code:null, status:'idle' };   // drives the Pairing panel: idle|waiting|confirm

function connectBridge(idx){
  const url = `ws://${HOST}:${PORTS[idx]}`;
  const c = { idx, ws:null, up:false, authenticated:false, sessionKeys:null, counters:{send:0,recv:0}, pairing:null, authPending:null };
  conns[idx]=c;
  const open=()=>{
    const ws=new WebSocket(url); ws.binaryType='arraybuffer'; c.ws=ws;
    ws.onopen=()=>{ c.up=true; updateConn(); sendTo(idx,{type:'hello',name:'mock-device',fw:'mock-0.2',caps:['session','macros','voice','settings'],device_id:DEVICE_ID}); log(`b${idx} connected (${url})`); };
    ws.onclose=()=>{ c.up=false; updateConn(); bridgeGone(idx); setTimeout(open,1000); };
    // Serialize the async handlers: WebCrypto awaits yield the event loop, so without this chain a
    // burst of frames (e.g. the encrypted snapshot the bridge sends right after auth_verify) can be
    // processed out of order / while c.authenticated is still being flipped — dropping the snapshot
    // (empty Macros page) or tripping the counter check. Each message fully completes before the next.
    c.q = Promise.resolve();
    ws.onmessage=(ev)=>{ c.q = c.q.then(()=>handleMessage(ev)).catch(()=>{}); };
    const handleMessage=async (e)=>{
      if (e.data instanceof ArrayBuffer) {   // binary: sound clip envelope [8B counter][ciphertext+tag]
        if (!c.authenticated) return;
        const buf = new Uint8Array(e.data);
        if (buf.length < 24) return;
        const n = Number(new DataView(buf.buffer).getBigUint64(0));
        if (n <= c.counters.recv) return;
        try { await gcmDecrypt(c.sessionKeys.recv, n, buf.subarray(8)); c.counters.recv=n; log(`◀b${idx} [audio clip, ${buf.length-24}B]`); }
        catch { log(`◀b${idx} [audio decrypt FAILED]`); }
        return;
      }
      let m; try{ m=JSON.parse(e.data); } catch { return; }
      if (m.type==='sec') {
        if (!c.authenticated) return;
        if (typeof m.n!=='number' || m.n<=c.counters.recv) return;
        try {
          const pt = await gcmDecrypt(c.sessionKeys.recv, m.n, unb64(m.ct));
          c.counters.recv = m.n;
          m = JSON.parse(new TextDecoder().decode(pt));
        } catch { log(`◀b${idx} [decrypt FAILED — tampered or replayed]`); return; }
      }
      log(`◀b${idx} ${JSON.stringify(m)}`,'log-rx');
      await handle(m, idx);
    };
  };
  open();
}
function updateConn(){ const up=conns.filter(c=>c&&c.up).length;
  const el=document.getElementById('connstate'); el.textContent=up?`connected (${up}/${PORTS.length})`:'disconnected'; el.className=up?'up':'down';
  renderPairing(); renderTrustList(); }
function sendTo(bridge, o){ const c=conns[bridge]; if(c&&c.ws&&c.ws.readyState===1){ c.ws.send(JSON.stringify(o)); log(`▶b${bridge} ${JSON.stringify(o)}`,'log-tx'); } }
async function sendSecureTo(bridge, o){
  const c=conns[bridge]; if(!c||!c.authenticated) return;
  try {
    c.counters.send++;
    const ct = await gcmEncrypt(c.sessionKeys.send, c.counters.send, utf8(JSON.stringify(o)));
    sendTo(bridge, { type:'sec', n:c.counters.send, ct:b64(ct) });
  } catch(e){ log('encrypt failed: '+e.message); }
}
async function sendFocus(o){ if(focus) await sendSecureTo(focus.bridge, o); }   // macros/voice/answers -> the focused session's bridge
function concernsFocus(m, bridge){ return focus && focus.bridge===bridge && (m.sid==null || m.sid===focus.sid); }

// ---------- pairing ceremony: ephemeral X25519 ECDH + a human-verified 6-digit code ----------
async function startPairingWithBridge(idx){
  const c=conns[idx]; if(!c||!c.up||c.authenticated||c.pairing) return;
  const {privateKey, rawPublic} = await genKeyPair();
  c.pairing = { myPriv:privateKey, myPub:rawPublic, theirPub:null, shared:null, sas:null, confirmedByMe:false, confirmedByPeer:false };
  sendTo(idx, { type:'pair_request', pub:b64(rawPublic) });
  pairingUi = { bridge:idx, code:null, status:'waiting' };
  renderPairing();
}
async function handlePairRequest(idx, m){   // bridge-initiated (claudeq pair); we're the responder
  const c=conns[idx]; if(!c) return;
  if (c.pairing) { sendTo(idx, { type:'pair_reject', reason:'busy' }); return; }
  let theirPub; try{ theirPub=unb64(m.pub); } catch{ return; }
  if (theirPub.length!==32) return;
  const {privateKey, rawPublic} = await genKeyPair();
  const shared = await ecdh(privateKey, theirPub);
  const sas = await sas6(shared, rawPublic, theirPub);
  c.pairing = { myPriv:privateKey, myPub:rawPublic, theirPub, shared, sas, confirmedByMe:false, confirmedByPeer:false };
  sendTo(idx, { type:'pair_response', pub:b64(rawPublic) });
  pairingUi = { bridge:idx, code:sas, status:'confirm' };
  renderPairing();
}
async function handlePairResponse(idx, m){   // we initiated; peer just replied — compute the SAS
  const c=conns[idx]; const p=c&&c.pairing; if(!p||p.theirPub) return;
  let theirPub; try{ theirPub=unb64(m.pub); } catch{ return; }
  if (theirPub.length!==32) return;
  p.theirPub = theirPub;
  p.shared = await ecdh(p.myPriv, theirPub);
  p.sas = await sas6(p.shared, p.myPub, theirPub);
  pairingUi = { bridge:idx, code:p.sas, status:'confirm' };
  renderPairing();
}
async function maybeFinalizePairing(idx){
  const c=conns[idx]; const p=c&&c.pairing;
  if(!p || !p.confirmedByMe || !p.confirmedByPeer) return;
  const psk = await derivePsk(p.shared);
  const bridgeId = bidByBridge[idx] || `bridge-${idx}`;
  trustStore[bridgeId] = { psk:b64(psk), label:hosts[idx]||bridgeId, pairedAt:Date.now() };
  saveTrust(trustStore);
  c.pairing = null;
  sendTo(idx, { type:'pair_ack', ok:true, label:DEVICE_ID.slice(0,8) });
  pairingUi = { bridge:null, code:null, status:'idle' };
  log('paired with bridge '+bridgeId);
  renderPairing(); renderTrustList();
  await startAuth(idx);   // immediately authenticate this now-paired connection
}
async function handlePairConfirm(idx, m){
  const c=conns[idx]; const p=c&&c.pairing; if(!p||!p.sas) return;
  p.confirmedByPeer = true;
  await maybeFinalizePairing(idx);
}
function handlePairReject(idx, m){
  const c=conns[idx]; if(c) c.pairing=null;
  if (pairingUi.bridge===idx) pairingUi = { bridge:null, code:null, status:'idle' };
  log('pairing rejected: '+(m.reason||'unknown'));
  renderPairing();
}
function handlePairAck(idx, m){ log(`pairing ack from bridge b${idx} (ok=${!!m.ok})`); }
async function confirmPairing(){
  const idx=pairingUi.bridge; const c=conns[idx]; const p=c&&c.pairing;
  if(!p||!p.sas) return;
  p.confirmedByMe = true;
  sendTo(idx, { type:'pair_confirm' });
  await maybeFinalizePairing(idx);
}
function rejectPairing(){
  const idx=pairingUi.bridge; const c=conns[idx];
  if (c&&c.pairing){ sendTo(idx, { type:'pair_reject', reason:'user' }); c.pairing=null; }
  pairingUi = { bridge:null, code:null, status:'idle' };
  renderPairing();
}
function forgetBridge(bridgeId){
  delete trustStore[bridgeId]; saveTrust(trustStore);
  conns.forEach(c=>{ if(c && bidByBridge[c.idx]===bridgeId){ c.authenticated=false; c.sessionKeys=null; c.counters={send:0,recv:0}; } });
  log('forgot bridge '+bridgeId);
  renderTrustList(); renderPairing();
}
function disconnectBridge(bridgeId){   // close the live connection only; trust (PSK) stays, so it re-authenticates on reconnect
  conns.forEach(c=>{ if(c && bidByBridge[c.idx]===bridgeId && c.ws) c.ws.close(); });
}

// ---------- per-connection auth handshake: runs automatically once hello_ack shows we're already paired ----------
async function startAuth(idx){
  const c=conns[idx]; if(!c||!c.up||c.authenticated) return;
  const bridgeId = bidByBridge[idx];
  const trusted = bridgeId && trustStore[bridgeId];
  if(!trusted) { renderPairing(); return; }   // not paired (yet) with this bridge_id — offer pairing instead
  const psk = unb64(trusted.psk);
  const {privateKey, rawPublic} = await genKeyPair();
  const nonceDevice = randomBytes(16);
  c.authPending = { priv:privateKey, pub:rawPublic, nonceDevice, psk };
  sendTo(idx, { type:'auth_hello', nonce:b64(nonceDevice), pub:b64(rawPublic) });
  renderPairing();
}
async function handleAuthChallenge(idx, m){
  const c=conns[idx]; const ap=c&&c.authPending; if(!ap) return;
  const nonceBridge = unb64(m.nonce), pubBridgeEph = unb64(m.pub);
  const ecdhShared = await ecdh(ap.priv, pubBridgeEph);
  const transcript = await authTranscript(ap.nonceDevice, nonceBridge, ap.pub, pubBridgeEph);
  const sessionKey = await deriveSessionKey(ap.psk, ecdhShared, transcript);
  const dirs = await directionalKeys(sessionKey);
  Object.assign(ap, { sessionKey, transcript, dirs });
  sendTo(idx, { type:'auth_verify', mac:b64(await authTag(sessionKey,'device',transcript)) });
}
async function handleAuthVerify(idx, m){
  const c=conns[idx]; const ap=c&&c.authPending; if(!ap||!ap.sessionKey) return;
  const expected = await authTag(ap.sessionKey, 'bridge', ap.transcript);
  let got; try{ got=unb64(m.mac); } catch{ return; }
  if (cmpBytes(got, expected)!==0){ log(`b${idx} auth failed: bad bridge MAC`); c.authPending=null; return; }
  c.sessionKeys = { send:ap.dirs.d2b, recv:ap.dirs.b2d };   // device sends with d2b, receives with b2d
  c.counters = { send:0, recv:0 };
  c.authenticated = true; c.authPending = null;
  log(`b${idx} authenticated`);
  updateConn();
}
function handleAuthReject(idx, m){ log(`b${idx} auth rejected: ${m.reason||'unknown'}`); const c=conns[idx]; if(c) c.authPending=null; renderPairing(); }

function renderPairing(){
  const el=document.getElementById('pairing-panel'); if(!el) return;
  if (pairingUi.status==='idle'){
    const candidates = conns.filter(c=>c && c.up && !c.authenticated && !c.pairing && !c.authPending);
    if(!candidates.length){ el.innerHTML=''; return; }
    el.innerHTML = '<div class="pairbox"><b>Unpaired bridges</b><br>'+
      candidates.map(c=>`<button data-b="${c.idx}" class="pairbtn">Pair with b${c.idx} (${hosts[c.idx]||'?'})</button>`).join('')+'</div>';
    el.querySelectorAll('.pairbtn').forEach(b=> b.onclick=()=>startPairingWithBridge(parseInt(b.dataset.b,10)));
  } else if (pairingUi.status==='waiting'){
    el.innerHTML = `<div class="pairbox">Waiting for bridge b${pairingUi.bridge} to respond…</div>`;
  } else if (pairingUi.status==='confirm'){
    el.innerHTML = `<div class="pairbox">Confirm this code matches <code>claudeq pair</code> on the bridge:
      <div class="code">${pairingUi.code}</div>
      <button id="pairConfirmBtn">Confirm</button><button id="pairRejectBtn" class="reject">Reject</button></div>`;
    document.getElementById('pairConfirmBtn').onclick=confirmPairing;
    document.getElementById('pairRejectBtn').onclick=rejectPairing;
  }
}
function renderTrustList(){
  const el=document.getElementById('trust-panel'); if(!el) return;
  const ids=Object.keys(trustStore);
  if(!ids.length){ el.innerHTML=''; return; }
  el.innerHTML = '<div class="pairbox"><b>Paired bridges</b>'+
    ids.map(id=>{
      const live = conns.some(c=>c && bidByBridge[c.idx]===id && c.authenticated);
      return `<div class="trustrow"><span>${trustStore[id].label||id} ${live?'🟢':'⚪'}</span>`+
        `<span><button data-id="${id}" class="discBtn">Disconnect</button><button data-id="${id}" class="forgetBtn">Forget</button></span></div>`;
    }).join('')+'</div>';
  el.querySelectorAll('.discBtn').forEach(b=> b.onclick=()=>disconnectBridge(b.dataset.id));
  el.querySelectorAll('.forgetBtn').forEach(b=> b.onclick=()=>forgetBridge(b.dataset.id));
}

async function handle(m, bridge){
  switch(m.type){
    case 'hello_ack':
      bidByBridge[bridge]=m.bridge_id??null; if(m.host) hosts[bridge]=m.host;
      log(`b${bridge} hello_ack: paired=${!!m.paired}`);
      if (m.paired) await startAuth(bridge); else renderPairing();
      renderTrustList();
      break;
    case 'pair_request': await handlePairRequest(bridge, m); break;
    case 'pair_response': await handlePairResponse(bridge, m); break;
    case 'pair_confirm': await handlePairConfirm(bridge, m); break;
    case 'pair_reject': handlePairReject(bridge, m); break;
    case 'pair_ack': handlePairAck(bridge, m); break;
    case 'auth_challenge': await handleAuthChallenge(bridge, m); break;
    case 'auth_verify': await handleAuthVerify(bridge, m); break;
    case 'auth_reject': handleAuthReject(bridge, m); break;
    case 'sessions':
      if(m.host) hosts[bridge]=m.host;
      bidByBridge[bridge]=m.bridge_id??null; lastListByBridge[bridge]=m.list||[];
      electPrimary(); rebuildSessions(); renderSessions(); renderStatus(); if(mode==='decide') render();
      break;
    case 'status': if(concernsFocus(m,bridge)){ state=m; renderStatus(); } break;
    case 'ask': if(m.sid){ if(!focus || focus.bridge!==bridge || focus.sid!==m.sid) feed=[]; focus={sid:m.sid, bridge}; } ask=m; qIdx=0; answersAcc={}; sel={}; mode='decide'; setTab(); pickOpen=false; renderSessions(); renderStatus(); render(); flash(); break;
    case 'ask_cancel': if(concernsFocus(m,bridge)){ ask=null; render(); } break;
    case 'hud': if(concernsFocus(m,bridge)){ hud=m; if(mode==='decide' && voiceState==='idle') render(); } break;
    case 'transcript': if(voiceState==='wait' && m.id===voiceId){ voiceState='confirm'; voiceText=m.text||''; render(); } break;
    case 'activity': if(concernsFocus(m,bridge)){
        if(m.feed){ feed=m.feed.slice(); } else if(m.line){ feed.push(m.line); if(feed.length>40) feed.shift(); }
        if(mode==='decide' && !ask) render();
      } break;
    case 'macros': macros=m.items||[]; if(mode==='macros') render(); break;
    case 'alert': flash(); log('ALERT: '+m.text,'log-sys'); break;
  }
}
// Elect one primary connection per bridge_id (lowest connected index wins; a bridge with no id is its
// own primary — backward compatible). Shadows stay connected but contribute no sessions.
function electPrimary(){
  primaryByBridge={}; const winner={};
  conns.forEach(c=>{ if(!c||!c.up) return; const b=c.idx, id=bidByBridge[b];
    if(id==null){ primaryByBridge[b]=true; return; }
    if(winner[id]===undefined || b<winner[id]) winner[id]=b; });
  conns.forEach(c=>{ if(!c||!c.up) return; const b=c.idx, id=bidByBridge[b];
    if(id!=null) primaryByBridge[b]=(winner[id]===b); });
}
function rebuildSessions(){
  sessions=[];
  conns.forEach(c=>{ if(!c||!c.up||!primaryByBridge[c.idx]) return;
    (lastListByBridge[c.idx]||[]).forEach(s=>sessions.push({...s, bridge:c.idx})); });
  if(focus && !sessions.find(s=>s.bridge===focus.bridge && s.sid===focus.sid)){ focus=null; ask=null; feed=[]; }
  if(!focus && sessions.length){ focus={sid:sessions[0].sid, bridge:sessions[0].bridge}; feed=[]; }
}
function bridgeGone(bridge){
  delete bidByBridge[bridge]; delete lastListByBridge[bridge]; delete primaryByBridge[bridge];
  const c=conns[bridge]; if(c){ c.authenticated=false; c.sessionKeys=null; c.counters={send:0,recv:0}; c.pairing=null; c.authPending=null; }
  electPrimary(); rebuildSessions();   // a surviving shadow on another path is promoted -> its sessions show
  if(focus && focus.bridge===bridge){ focus=null; ask=null; feed=[]; }
  renderSessions(); renderStatus(); render(); renderPairing(); renderTrustList();
}
function focusedTitle(){ const s=focus && sessions.find(x=>x.bridge===focus.bridge && x.sid===focus.sid); return s?s.title:'—'; }
// One selector bar (focused session + count + "elsewhere needs you" badge); tap -> dropdown picker.
// Mirrors the firmware: the bar updates in place, only the dropdown lists every session.
let pickOpen=false;
function renderSessions(){ const sb=document.getElementById('sessbar');
  const prevPick=sb.querySelector('.sesspick');
  const prevScroll=prevPick?prevPick.scrollTop:null;   // null = picker wasn't in the DOM (this is a fresh open)
  sb.innerHTML='';
  if(!sessions.length){ pickOpen=false; return; }
  const foc = focus && sessions.find(s=>s.bridge===focus.bridge && s.sid===focus.sid);
  const needsElsewhere = sessions.filter(s=>s!==foc && s.needs).length;
  const btn=document.createElement('div');
  btn.className='sessbtn'+(needsElsewhere?' needs':(foc?' focus':''));
  const t=document.createElement('span'); t.className='t'+(foc?'':' dim'); t.textContent=foc?foc.title:'tap to select';
  btn.appendChild(t);
  if(needsElsewhere){ const b=document.createElement('span'); b.className='badge'; b.textContent='🔔'+needsElsewhere; btn.appendChild(b); }
  const n=document.createElement('span'); n.className='n'; n.textContent=sessions.length+' ▾';
  btn.appendChild(n);
  btn.onclick=()=>{ pickOpen=!pickOpen; renderSessions(); };
  sb.appendChild(btn);
  if(!pickOpen) return;
  const pick=document.createElement('div'); pick.className='sesspick';
  sessions.forEach(s=>{
    const isFoc = s===foc;
    const clash = sessions.some(o=>o!==s && o.bridge!==s.bridge && o.title===s.title);
    const r=document.createElement('div');
    r.className='pickrow'+(isFoc?' focus':'')+(s.needs?' needs':'');
    const ic=document.createElement('span'); ic.className='ic'; ic.textContent=s.needs?'🔔':(isFoc?'›':'');
    const tt=document.createElement('span'); tt.className='t'; tt.textContent=s.title;
    if(clash && hosts[s.bridge]){ const h=document.createElement('span'); h.className='host'; h.textContent='@'+hosts[s.bridge]; tt.appendChild(h); }
    r.append(ic,tt);
    r.title=`${s.sid} @ bridge ${s.bridge}`;
    r.onclick=(ev)=>{ ev.stopPropagation(); pickOpen=false;
      focus={sid:s.sid, bridge:s.bridge}; feed=[]; sendSecureTo(s.bridge,{type:'focus', sid:s.sid});
      renderSessions(); renderStatus(); if(mode==='decide') render(); };
    pick.appendChild(r);
  });
  sb.appendChild(pick);
  if(prevScroll!=null){ pick.scrollTop=prevScroll; }   // live rebuild: keep the user's scroll position
  else{ // fresh open: land on the first OTHER session that needs you, else the focused one (mirrors firmware)
    const tgt=pick.querySelector('.pickrow.needs:not(.focus)')||pick.querySelector('.pickrow.focus');
    if(tgt) pick.scrollTop=Math.max(0, tgt.offsetTop-8);
  }
}
function renderStatus(){ document.getElementById('dot').className='dot '+(state.state||'idle');
  document.getElementById('titletxt').textContent=focusedTitle();
  document.getElementById('statetxt').textContent=(state.text||state.state||''); }
function flash(){ const f=document.getElementById('flash'); f.classList.remove('on'); void f.offsetWidth; f.classList.add('on'); }

function render(){
  const b=document.getElementById('body'); b.innerHTML='';
  if(voiceState!=='idle'){ renderVoice(b); return; }   // mic action overlays whatever tab is showing
  if(mode==='decide'){
    if(!ask){ renderFeed(b); }
    else {
      const q=ask.questions[qIdx];
      const prog = ask.questions.length>1 ? ` (${qIdx+1}/${ask.questions.length})` : '';
      b.innerHTML += `<span class="hdr">${(q.header||'Question')+prog}</span><div class="q">${q.question}</div>`;
      q.options.forEach((o,i)=>{
        const d=document.createElement('div'); d.className='opt'+(sel[i]?' sel':'');
        d.innerHTML=`<div class="l">${o.label}</div>${o.description?`<div class="d">${o.description}</div>`:''}`;
        d.onclick=()=>chooseOption(q,i); b.appendChild(d);
      });
      if(q.multiSelect){ const c=document.createElement('button'); c.className='confirm';
        c.textContent='Confirm selection'; c.onclick=()=>confirmMulti(q); b.appendChild(c); }
    }
    renderHudStrip(b);   // compact telemetry pinned to the bottom of the Session page
  } else if(mode==='macros'){
    if(!macros.length){ b.innerHTML='<div class="placeholder">No macros configured.</div>'; return; }
    const g=document.createElement('div'); g.className='macros';
    macros.forEach(mc=>{ const d=document.createElement('div'); d.className='macro';
      d.innerHTML=`<div class="i">${mc.icon||'▷'}</div><div class="t">${mc.label}</div>`;
      d.onclick=()=>sendFocus({type:'macro', id:mc.id}); g.appendChild(d); });
    b.appendChild(g);
  } else if(mode==='settings'){
    renderSettings(b);
  }
}
function renderHudStrip(b){
  const model=hud.model||'-', secs=hud.elapsedMs?Math.round(hud.elapsedMs/1000):0,
        tool=hud.lastTool||'-', todos=(hud.todos&&hud.todos.length)||0;
  const s=document.createElement('div'); s.className='hudstrip';
  s.textContent=`${model} | ${secs}s | ${tool} | ${todos} todo`; b.appendChild(s);
}
// Settings toggles are device-local (NVS) with no bridge protocol, so they're inert stubs in the mock.
function renderSettings(b){
  b.innerHTML=`<div class="setrow"><span>WiFi</span><input type="checkbox" checked disabled></div>
    <div class="setrow"><span>Tailscale</span><input type="checkbox" disabled></div>
    <div class="placeholder" style="margin-top:16px">${'☉'} hold: WiFi portal</div>
    <div class="placeholder" style="margin-top:6px;font-size:10px">(device-local; no bridge protocol)</div>`;
}
// Voice: tap mic -> record -> Stop -> transcript -> Send/Cancel. The mock sends no PCM, so the bridge
// returns an empty transcript ("(no speech)"); this still exercises the full message round-trip + confirm UI.
function renderVoice(b){
  if(voiceState==='rec'){
    b.innerHTML='<div class="placeholder" style="color:var(--ok);margin-top:60px">Listening…</div>';
    const s=document.createElement('button'); s.className='confirm'; s.textContent='Stop'; s.onclick=voiceStop; b.appendChild(s);
  } else if(voiceState==='wait'){
    b.innerHTML='<div class="placeholder" style="margin-top:60px">Transcribing…</div>';
  } else if(voiceState==='confirm'){
    b.innerHTML=`<div class="q" style="margin-top:24px">${voiceText||'(no speech)'}</div>`;
    if(voiceText){
      const s=document.createElement('button'); s.className='confirm'; s.textContent='Send'; s.onclick=voiceCommit; b.appendChild(s);
      const c=document.createElement('div'); c.className='opt'; c.style.textAlign='center'; c.textContent='Cancel'; c.onclick=voiceCancel; b.appendChild(c);
    } else {
      const c=document.createElement('button'); c.className='confirm'; c.textContent='Dismiss'; c.onclick=voiceCancel; b.appendChild(c);
    }
  }
}
function voiceToggle(){ if(voiceState!=='idle'||!focus) return; voiceId++; voiceState='rec'; sendFocus({type:'voice_start', id:voiceId}); render(); }
function voiceStop(){ if(voiceState!=='rec') return; voiceState='wait'; sendFocus({type:'voice_end', id:voiceId}); render(); }
function voiceCommit(){ sendFocus({type:'voice_commit', id:voiceId}); voiceState='idle'; render(); }
function voiceCancel(){ sendFocus({type:'voice_cancel', id:voiceId}); voiceState='idle'; render(); }
const FEED_SYM={tool:'›', prompt:'›', notify:'!', done:'✓', start:'·', thinking:'…', reply:'‹'};
function renderFeed(b){
  if(!feed.length){ b.innerHTML='<div class="feedhint">'+(focus?'Claude is idle.<br>Following along…':'Waiting for a session…')+'</div>'; return; }
  const active = state.state==='working' || state.state==='thinking';
  const w=document.createElement('div'); w.className='feed';
  feed.forEach((ln,i)=>{ const d=document.createElement('div');
    d.className='feedline k-'+(ln.kind||'tool')+(active && i===feed.length-1?' now':'');
    d.innerHTML=`<span class="fk">${FEED_SYM[ln.kind]||'›'}</span><span class="fd">${ln.detail||''}</span>`;
    w.appendChild(d); });
  b.appendChild(w);
  b.scrollTop=b.scrollHeight;   // auto-scroll to newest
}
function advanceAsk(){ qIdx++;
  if(qIdx < ask.questions.length){ sel={}; render(); }      // more questions in this ask
  else { sendFocus({type:'answer', id:ask.id, answers:answersAcc}); ask=null; render(); } }
function chooseOption(q,i){ if(q.multiSelect){ sel[i]=!sel[i]; render(); }
  else { answersAcc[q.question]=q.options[i].label; advanceAsk(); } }
function confirmMulti(q){ answersAcc[q.question]=q.options.filter((_,i)=>sel[i]).map(o=>o.label).join(', '); advanceAsk(); }
function setTab(){ document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.m===mode)); }
document.querySelectorAll('.tab').forEach(t=> t.onclick=()=>{ if(t.dataset.m==='voice'){ voiceToggle(); return; } mode=t.dataset.m; setTab(); render(); });

renderStatus(); render(); renderPairing(); renderTrustList(); PORTS.forEach((_,i)=>connectBridge(i));
</script>
